name: Deploy Immich

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      server_image:
        description: "Override immich-server image for rollback (e.g. ghcr.io/kevinsarav/immich-server-mirror:2026-07-01). Leave blank to pull upstream latest."
        required: false
        default: ""
      ml_image:
        description: "Override immich-machine-learning image for rollback (e.g. ghcr.io/kevinsarav/immich-machine-learning-mirror:2026-07-01). Leave blank to pull upstream latest."
        required: false
        default: ""
  schedule:
    - cron: "0 11 * * 0" # Weekly, Sunday 05:00 CST (UTC-6)

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in DEPLOY_USER DEPLOY_HOST DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing required deployment secrets::Set these secrets in repository secrets or Environment 'production': ${missing[*]}"
            exit 1
          fi

          if [[ -z "${DEPLOY_PORT:-}" ]]; then
            echo "DEPLOY_PORT not set; defaulting to 22"
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest main and deploy on server
        shell: bash
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          SERVER_IMAGE_OVERRIDE: ${{ inputs.server_image }}
          ML_IMAGE_OVERRIDE: ${{ inputs.ml_image }}
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' SERVER_IMAGE_OVERRIDE='$SERVER_IMAGE_OVERRIDE' ML_IMAGE_OVERRIDE='$ML_IMAGE_OVERRIDE' bash '$DEPLOY_PATH/scripts/deploy-remote.sh'"

      - name: Verify Immich is healthy
        shell: bash
        run: |
          set -euo pipefail
          echo "Polling Immich health endpoint (up to 2 minutes)..."
          for i in {1..12}; do
            if ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "curl -sf http://localhost:2283/api/server/ping 2>/dev/null | grep -q 'pong'"; then
              echo "Immich is healthy."
              exit 0
            fi
            echo "Attempt $i/12 — not yet healthy, retrying in 10s..."
            sleep 10
          done
          echo "::error title=Health check failed::Immich did not become healthy within 2 minutes after deploy."
          exit 1
